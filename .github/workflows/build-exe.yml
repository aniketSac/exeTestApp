name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger the build manually from GitHub

jobs:
  build:
    runs-on: windows-latest # Tells GitHub to use a real Windows VM!

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller websockets pywebview

    - name: Build EXE with PyInstaller
      working-directory: ./app
      run: |
        pyinstaller --onefile --noconsole --collect-all pywebview --add-data "index.html;." main.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-Windows-EXE
        path: app/dist/*.exe