name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller websockets pywebview pythonnet webview2

    - name: Build with PyInstaller
      working-directory: ./app
      run: pyinstaller main.py --add-data "index.html;." --icon=icon.ico --add-data "icon.ico;." --collect-all pywebview --collect-all pythonnet

    - name: Upload Output Folder
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-Windows-Build
        path: app/dist/main/