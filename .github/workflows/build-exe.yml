name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller websockets pywebview pythonnet clr_loader webview2

    - name: Build with PyInstaller
      working-directory: ./app
      run: |
        pyinstaller --noconfirm `
          --onedir `
          --windowed `
          --icon=icon.ico `
          --add-data "index.html;." `
          --add-data "icon.ico;." `
          --collect-all pywebview `
          --collect-all pythonnet `
          --collect-all clr_loader `
          main.py

    - name: Zip Build Folder
      run: |
        Compress-Archive -Path "app/dist/main/*" -DestinationPath "app/dist/MyApp-Windows.zip"

    - name: Upload Output Zip
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-Windows-Build
        path: app/dist/MyApp-Windows.zip