name: Download Offline Windows Wheels

on:
  workflow_dispatch:
  push: # <--- Added: Temporarily triggers on push to register the workflow in GitHub's database

jobs:
  download-wheels:
    runs-on: windows-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Download Wheels
      run: |
        mkdir wheels
        pip download pywebview websockets pyinstaller -d ./wheels

    - name: Upload Wheels Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-pip-wheels
        path: wheels/*